<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA + mobile -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Salsabil" />
    <meta name="theme-color" content="#14b8a6" />

    <!-- Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/salsabil-icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/salsabil-icon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/salsabil-icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/salsabil-icon-152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/salsabil-icon-144.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/salsabil-icon-120.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Font preconnect -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

    <!-- SEO -->
    <title>Salsabil — Focus & Spiritual Growth</title>
    <meta name="description" content="Combine deep focus with spiritual practice. Track prayers, Quran, adhkar, and grow your garden one session at a time." />
    <meta property="og:title" content="Salsabil" />
    <meta property="og:description" content="Focus meets faith. Grow your garden, track your prayers, build your best self." />
    <meta property="og:image" content="/salsabil-icon-512.png" />
    <meta property="og:type" content="website" />

    <!-- Prevent theme flash -->
    <script>
      (function () {
        const t = localStorage.getItem('salsabil-theme')
        const dark = t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
